spring.config.import=optional:dotenv:

spring.application.name=InsightCore_AI

# 1. API Key OpenRouter
spring.ai.openai.api-key=${OPENAI_API_KEY:}

# 2. Base URL OpenRouter 
spring.ai.openai.base-url=${OPENAI_BASE_URL:https://openrouter.ai/api}

# 3. Model U want use from OpenRouter (Mital: Claude 3.5 Sonnet or Llama 3)
spring.ai.openai.chat.options.model=${OPENAI_MODEL:openai/gpt-oss-120b:free}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/insightcore_ai}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sa}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

logging.level.org.springframework.ai=DEBUG